/* ─── Utils ──────────────────────────────────────────────── */
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function useLS(key, def) {
  const [val, setVal] = useState(() => {
    try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; }
    catch { return def; }
  });
  const set = useCallback(v => {
    setVal(prev => {
      const next = typeof v === 'function' ? v(prev) : v;
      try { localStorage.setItem(key, JSON.stringify(next)); } catch(e) { alert('שגיאה בשמירה — אחסון מלא?'); }
      return next;
    });
  }, [key]);
  return [val, set];
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function getSocialIcon(url) {
  if (!url) return null;
  if (url.includes('instagram')) return '📸';
  if (url.includes('tiktok')) return '🎵';
  if (url.includes('facebook') || url.includes('fb.')) return '👥';
  return '🔗';
}

/* ─── Modal ──────────────────────────────────────────────── */
function Modal({ title, onClose, children, wide }) {
  useEffect(() => {
    const esc = e => e.key === 'Escape' && onClose();
    document.addEventListener('keydown', esc);
    return () => document.removeEventListener('keydown', esc);
  }, [onClose]);
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-box" style={wide ? {maxWidth:640} : {}}>
        <div className="flex justify-between items-center mb-5">
          <h2 style={{fontSize:'1.2rem', fontWeight:700, color:'#1f2937'}}>{title}</h2>
          <button onClick={onClose} style={{background:'none', border:'none', fontSize:'1.4rem', cursor:'pointer', color:'#9ca3af', lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

/* ─── SyncModal ──────────────────────────────────────────── */
function SyncModal({ token, gistId, lastSync, onClose, onSaveToken, onSyncTo, onSyncFrom }) {
  const [inputToken, setInputToken] = useState(token || '');
  const [showToken, setShowToken] = useState(false);
  const [status, setStatus] = useState(null); // null | 'saving' | 'loading' | 'saved' | 'loaded' | 'error'
  const [errMsg, setErrMsg] = useState('');
  const tokenChanged = inputToken.trim() !== token;
  const busy = status === 'saving' || status === 'loading';

  async function handleSyncTo() {
    setStatus('saving'); setErrMsg('');
    const result = await onSyncTo();
    if (result.ok) { setStatus('saved'); setTimeout(onClose, 1800); }
    else { setStatus('error'); setErrMsg(result.msg || ''); }
  }
  async function handleSyncFrom() {
    setStatus('loading'); setErrMsg('');
    const result = await onSyncFrom();
    if (result.ok) { setStatus('loaded'); setTimeout(onClose, 1800); }
    else { setStatus('error'); setErrMsg(result.msg || ''); }
  }

  return (
    <Modal title="☁️ סנכרון GitHub" onClose={onClose}>
      <div style={{display:'flex', flexDirection:'column', gap:14}}>

        {/* Status banner — shown at TOP so always visible on mobile */}
        {status === 'saving'  && <div style={{background:'#fef3c7', borderRadius:10, padding:'12px 14px', color:'#92400e', fontWeight:600, textAlign:'center'}}>⏳ שומר לענן...</div>}
        {status === 'loading' && <div style={{background:'#fef3c7', borderRadius:10, padding:'12px 14px', color:'#92400e', fontWeight:600, textAlign:'center'}}>⏳ מחפש וטוען מהענן...</div>}
        {status === 'saved'   && <div style={{background:'#d1fae5', borderRadius:10, padding:'12px 14px', color:'#065f46', fontWeight:600, textAlign:'center'}}>✅ נשמר בענן בהצלחה! סוגר...</div>}
        {status === 'loaded'  && <div style={{background:'#d1fae5', borderRadius:10, padding:'12px 14px', color:'#065f46', fontWeight:600, textAlign:'center'}}>✅ נטען מהענן בהצלחה! סוגר...</div>}
        {status === 'error'   && <div style={{background:'#fee2e2', borderRadius:10, padding:'12px 14px', color:'#991b1b', fontWeight:600}}>❌ שגיאה: {errMsg || 'בדוק שה-Token תקין ויש לו הרשאת gist'}</div>}

        {/* Token input */}
        <div>
          <label style={{fontSize:'0.85rem', fontWeight:600, color:'#374151', display:'block', marginBottom:6}}>
            GitHub Personal Access Token
          </label>
          <div style={{display:'flex', gap:6}}>
            <input
              className="input-field"
              type={showToken ? 'text' : 'password'}
              value={inputToken}
              onChange={e => setInputToken(e.target.value)}
              placeholder="ghp_xxxxxxxxxxxxxxxxxxxx"
              style={{flex:1, fontFamily:'monospace', fontSize:'0.85rem'}}
            />
            <button onClick={() => setShowToken(p=>!p)}
              style={{background:'#f3f4f6', border:'1.5px solid #d1d5db', borderRadius:8, padding:'0 10px', cursor:'pointer', fontSize:'1rem'}}>
              {showToken ? '🙈' : '👁️'}
            </button>
          </div>
          {tokenChanged && inputToken.trim() && (
            <button className="btn-primary" style={{marginTop:8, width:'100%', fontSize:'0.9rem'}}
              onClick={() => { onSaveToken(inputToken.trim()); setStatus(null); }}>
              💾 שמור Token
            </button>
          )}
          {!token && (
            <p style={{fontSize:'0.8rem', color:'#9ca3af', marginTop:6}}>
              צור Token ב-GitHub → Settings → Developer settings → Personal access tokens (classic) → scope: <strong>gist</strong>
            </p>
          )}
        </div>

        {/* Sync buttons */}
        {token && !tokenChanged && !busy && status !== 'saved' && status !== 'loaded' && (
          <div style={{display:'flex', flexDirection:'column', gap:8}}>
            <button className="btn-primary" onClick={handleSyncTo}
              style={{display:'flex', alignItems:'center', justifyContent:'center', gap:8, padding:'12px'}}>
              ☁️ שמור לענן עכשיו
            </button>
            <button className="btn-secondary" onClick={handleSyncFrom}
              style={{display:'flex', alignItems:'center', justifyContent:'center', gap:8, padding:'12px'}}>
              🔄 טען מהענן (דרוס מקומי)
            </button>
          </div>
        )}

        {/* Last sync info */}
        {lastSync && !status && (
          <p style={{fontSize:'0.78rem', color:'#d1d5db', textAlign:'center'}}>
            סנכרון אחרון: {new Date(lastSync).toLocaleString('he-IL')}
          </p>
        )}
      </div>
    </Modal>
  );
}

/* ─── Text Paste Parser ──────────────────────────────────── */
/* Returns true if the line is a section sub-header (not an actual ingredient) */
function isIngSubHeader(text) {
  if (!text) return true;

  // Explicit: ends with colon
  if (text.endsWith(':')) return true;

  // Explicit: known section-label words
  if (/^(המרכיבים|טבלת המרות|החומרים|הרכיבים|חומרים|מרכיבים|רכיבים|לקישוט|להגשה|ציפוי|תוספות|ציפוי|קישוט)$/.test(text)) return true;

  // Strong ingredient signals → always ingredient
  const hasDigit = /\d/.test(text);
  const hasMeasure = /כוס|כף|כפית|גרם|ק"ג|מ"ל|ליטר|יח'|יחידות|חבילה|שקית|קופסא|קופסה|מיכל|מנה|פרוסה|חתיכה|ענף|קורט|טיפה/.test(text);
  if (hasDigit || hasMeasure) return false;

  // Food ingredient keywords → always ingredient (even without quantity)
  const foodWords = /קמח|סוכר|חמאה|שמן|ביצ|חלב|שמנת|גבינה|יוגורט|דבש|ריבה|מלח|פלפל|כמון|פפריקה|קינמון|וניל|שוקולד|קקאו|קורנפלור|שמרים|סודה|אבקת|קוקוס|שקד|אגוז|קשיו|פיסטוק|צימוק|תמר|תפוח|בננה|לימון|תפוז|תות|אפרסק|מנגו|אבוקדו|עגבניה|מלפפון|גזר|בצל|שום|תפוח אדמה|בטטה|כרוב|חסה|תרד|פטריה|עוף|בשר|דג|טונה|סלמון|שרימפס|גחלים|אורז|פסטה|קינואה|עדשים|חומוס|שעועית|טחינה|פסטו|רוטב|קטשופ|חרדל|מיונז|חומץ|יין|מיץ|מים|קפה|תה|כורכום|זעתר|בהרט|רוזמרין|טימין|בזיליקום|אורגנו|עלי דפנה|ג'ינג'ר|הל|ציפורן|אניס|כוסברה|פטרוזיליה|שמיר|נענע|עירית|תבלין/.test(text);
  if (foodWords) return false;

  // Sub-header signals: starts with prep-direction words or connector "ל"
  const startsWithPrep = /^(ל|של|עבור|לציפוי|לבלילה|לרוטב|למילוי|לקרם|לגנאש|לקישוט|לבסיס|לתחתית|לשכבה|לסירופ|לרבוכה|להכנת|לבישול|לאפייה)/.test(text);
  if (startsWithPrep) return true;

  // Short line (≤3 words) with no food signals → probably a label
  const wordCount = text.split(/\s+/).filter(Boolean).length;
  return wordCount <= 3;
}

/* Try to split a text block into step texts using numbered/bullet markers */
function extractStepTexts(text) {
  const patterns = [
    /(?:^|\s+)\d{1,2}[.)]\s+/,   // "1. " or "2) "
    /(?:^|\s+)0\d\s+/,             // "01 " "02 " zero-padded
    /(?:^|\s+)שלב\s*\d+\s*/,       // "שלב 1 " "שלב2"
    /(?:^|\s+)\d{1,2}:\s+/,         // "1: "
  ];
  for (const pat of patterns) {
    const parts = text.split(pat).map(s => s.trim()).filter(s => s.length > 3);
    if (parts.length > 1) return parts;
  }
  return null; // no split found
}

function parseRecipeText(raw) {
  // Keep original lines including empty ones (for paragraph detection in steps)
  const lines = raw.split('\n').map(l => l.trim());

  const reIngHeader = /^(מצרכים|רשימת מצרכים|חומרים|רכיבים|המרכיבים|ל[א-ת]{2,})[\s:]*$/;
  const reStepHeader = /^(הכנה|אופן הכנה|שיטת הכנה|הוראות הכנה|דרך הכנה|הוראות|שלבי הכנה|אופן ההכנה|ההכנה|הכנת|תהליך הכנה)[\s:]*$/;
  const reNumLine = /^\d+[.):\-]\s*.+/;
  const reBullet = /^[-•*·▪◦➤→✓]\s+/;

  // Collect lines into sections; preserve empty lines as PARA_BREAK in steps
  let ingLines = [], stepLines = [], section = null;
  for (const line of lines) {
    if (!line) {
      if (section === 'step') stepLines.push(''); // paragraph separator
      continue;
    }
    if (reIngHeader.test(line)) { section = 'ing'; continue; }
    if (reStepHeader.test(line)) { section = 'step'; continue; }
    if (section === 'ing') ingLines.push(line);
    else if (section === 'step') stepLines.push(line);
    else ingLines.push(line);
  }

  // Auto-detect boundary if no step section header was found
  if (stepLines.length === 0 && ingLines.length > 0) {
    const nonEmptyIng = ingLines.filter(Boolean);
    const firstNumIdx = nonEmptyIng.findIndex(l => reNumLine.test(l));
    if (firstNumIdx > 0) {
      stepLines = nonEmptyIng.slice(firstNumIdx); ingLines = nonEmptyIng.slice(0, firstNumIdx);
    } else if (firstNumIdx === 0) {
      stepLines = nonEmptyIng; ingLines = [];
    } else {
      const firstLongIdx = nonEmptyIng.findIndex(l => l.length > 55);
      if (firstLongIdx > 0) { stepLines = nonEmptyIng.slice(firstLongIdx); ingLines = nonEmptyIng.slice(0, firstLongIdx); }
      else { stepLines = nonEmptyIng; ingLines = []; }
    }
  }

  // ── Parse ingredients: sub-headers become {type:'subheader'}, rest are ingredients ──
  const ingredients = ingLines
    .filter(Boolean)
    .map(l => l.replace(reBullet, '').replace(/^\d+[.):\-]\s*/, '').trim())
    .filter(l => l.length > 0)
    .map(text => isIngSubHeader(text)
      ? { id: genId(), type: 'subheader', text: text.replace(/:$/, '') }
      : { id: genId(), type: 'ingredient', text }
    );

  // ── Parse steps: split by paragraphs, then try inline number splitting ──
  // Group stepLines into paragraphs (separated by empty lines)
  const paragraphs = [];
  let curPara = [];
  for (const line of stepLines) {
    if (line === '') {
      if (curPara.length > 0) { paragraphs.push(curPara.join(' ')); curPara = []; }
    } else {
      curPara.push(line);
    }
  }
  if (curPara.length > 0) paragraphs.push(curPara.join(' '));

  let stepTexts = [];
  if (paragraphs.length === 0) {
    stepTexts = [];
  } else if (paragraphs.length === 1) {
    // Single block — try inline splitting
    const split = extractStepTexts(paragraphs[0]);
    if (split && split.length > 1) {
      stepTexts = split;
    } else if (paragraphs[0].length > 180) {
      // Very long single block — split on sentence boundaries as last resort
      const sentences = paragraphs[0].split(/\.\s+(?=[א-ת"'])/).map(s => s.trim()).filter(s => s.length > 8);
      stepTexts = sentences.length > 1 ? sentences : [paragraphs[0]];
    } else {
      stepTexts = [paragraphs[0]];
    }
  } else {
    // Multiple paragraphs — each paragraph is a step (check for inline numbers within each)
    for (const para of paragraphs) {
      const split = extractStepTexts(para);
      if (split && split.length > 1) stepTexts.push(...split);
      else stepTexts.push(para.replace(/^\d+[.):\s]+\s*/, '').trim());
    }
  }

  const steps = stepTexts
    .map(t => t.replace(/^\d+[.):\s]+\s*/, '').replace(reBullet, '').trim())
    .filter(t => t.length > 0)
    .map(text => ({ id: genId(), text, image: null, videoUrl: '' }));

  return { ingredients, steps };
}

/* ─── RecipePage ─────────────────────────────────────────── */
function RecipePage({ recipe, category, categories, onUpdate, onDelete, navigate }) {
  const [editMode, setEditMode] = useState(!recipe.name || recipe.name === '');
  const [name, setName] = useState(recipe.name || '');
  const [coverImage, setCoverImage] = useState(recipe.coverImage || null);
  const [socialLink, setSocialLink] = useState(recipe.socialLink || '');
  const [ingredients, setIngredients] = useState(recipe.ingredients?.length ? recipe.ingredients : []);
  const [steps, setSteps] = useState(recipe.steps?.length ? recipe.steps : []);
  const [confirmDel, setConfirmDel] = useState(false);
  const [showMove, setShowMove] = useState(false);
  const [dirty, setDirty] = useState(false);
  const coverRef = useRef();
  const dragStepRef = useRef(null);

  const markDirty = () => setDirty(true);

  function save() {
    const updated = { ...recipe, name, coverImage, socialLink, ingredients, steps };
    onUpdate(updated);
    setDirty(false);
    setEditMode(false);
  }

  async function handleCoverUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { alert('תמונה גדולה מדי (מקסימום 3MB)'); return; }
    const b64 = await fileToBase64(file);
    setCoverImage(b64); markDirty();
  }

  function addIngredient() { setIngredients(p => [...p, {id:genId(), type:'ingredient', text:''}]); markDirty(); }
  function addIngSubheader() { setIngredients(p => [...p, {id:genId(), type:'subheader', text:''}]); markDirty(); }
  function updateIngredient(id, text) { setIngredients(p => p.map(i => i.id===id ? {...i,text} : i)); markDirty(); }
  function removeIngredient(id) { setIngredients(p => p.filter(i => i.id!==id)); markDirty(); }

  function addStep() { setSteps(p => [...p, {id:genId(), text:'', image:null, videoUrl:''}]); markDirty(); }
  function updateStep(id, key, val) { setSteps(p => p.map(s => s.id===id ? {...s,[key]:val} : s)); markDirty(); }
  function removeStep(id) { setSteps(p => p.filter(s => s.id!==id)); markDirty(); }

  async function handleStepImage(id, e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { alert('תמונה גדולה מדי (מקסימום 3MB)'); return; }
    const b64 = await fileToBase64(file);
    updateStep(id, 'image', b64);

  function moveStep(from, to) {
    if (to < 0 || to >= steps.length) return;
    const arr = [...steps];
    const [el] = arr.splice(from, 1);
    arr.splice(to, 0, el);

    <div style={{maxWidth:780, margin:'0 auto', padding:'24px 16px'}}>

            : <h1 style={{fontSize:'1.5rem', fontWeight:800, color:'#1f2937'}}>{name}</h1>
          }
          {!editMode && socialLink && (

/* ─── ConversionPage ─────────────────────────────────────── */
function ConversionPage({ conversions, setConversions }) {
  const [unitType, setUnitType] = useState('כוס');
  const [ingredient, setIngredient] = useState('');
  const [qty, setQty] = useState('');
  const [gramsInput, setGramsInput] = useState('');
  const [result, setResult] = useState(null);
  const [reverseResult, setReverseResult] = useState(null);
  const [showAddModal, setShowAddModal] = useState(false);
  const [editRow, setEditRow] = useState(null);
  const [confirmDel, setConfirmDel] = useState(null);
  const [filterUnit, setFilterUnit] = useState('הכל');

  const unitTypes = ['כוס', 'כף', 'כפית'];
  const filtered = conversions.filter(c => c.unitType === unitType);

  function calc() {
    if (!ingredient || !qty) { setResult(null); return; }
    const row = conversions.find(c => c.unitType === unitType && c.ingredient === ingredient);
    if (row) setResult((parseFloat(qty) * row.grams).toFixed(1));
    else setResult(null);
  }

  function calcReverse() {
    if (!ingredient || !gramsInput) { setReverseResult(null); return; }
    const row = conversions.find(c => c.unitType === unitType && c.ingredient === ingredient);
    if (row) setReverseResult((parseFloat(gramsInput) / row.grams).toFixed(2));
    else setReverseResult(null);
  }

  useEffect(() => { calc(); }, [unitType, ingredient, qty]);
  useEffect(() => { calcReverse(); }, [unitType, ingredient, gramsInput]);

  function deleteConv(id) { setConversions(p => p.filter(c => c.id !== id)); }
  function addConv(row) { setConversions(p => [...p, {...row, id:genId()}]); }
  function updateConv(row) { setConversions(p => p.map(c => c.id===row.id ? row : c)); }

  const displayUnits = ['הכל', ...unitTypes];
  const tableData = filterUnit === 'הכל' ? conversions : conversions.filter(c => c.unitType === filterUnit);

  return (
    <div style={{maxWidth:860, margin:'0 auto', padding:'28px 16px'}}>
      <h1 style={{fontSize:'1.7rem', fontWeight:800, color:'#1f2937', marginBottom:6}}>⚖️ מחשבון המרה</h1>
      <p style={{color:'#6b7280', fontSize:'0.9rem', marginBottom:24}}>המרת כוסות / כפות / כפיות לגרמים</p>

      {/* Calculator card */}
      <div style={{background:'white', borderRadius:18, padding:'24px', boxShadow:'0 2px 12px rgba(0,0,0,0.07)', marginBottom:24}}>
        <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fit, minmax(180px, 1fr))', gap:14, marginBottom:16}}>
          <div>
            <label style={{fontSize:'0.82rem', fontWeight:600, color:'#374151', display:'block', marginBottom:5}}>סוג מידה</label>
            <select className="input-field" value={unitType} onChange={e=>{setUnitType(e.target.value); setIngredient(''); setResult(null); setReverseResult(null);}}>
              {unitTypes.map(u => <option key={u} value={u}>{u}</option>)}
            </select>
          </div>
          <div>
            <label style={{fontSize:'0.82rem', fontWeight:600, color:'#374151', display:'block', marginBottom:5}}>מצרך</label>
            <select className="input-field" value={ingredient} onChange={e=>setIngredient(e.target.value)}>
              <option value="">-- בחר מצרך --</option>
              {filtered.map(c => <option key={c.id} value={c.ingredient}>{c.ingredient}</option>)}
            </select>
          </div>
        </div>

        {/* Forward calc */}
        <div style={{background:'#fff7ed', borderRadius:14, padding:'16px', marginBottom:12}}>
          <p style={{fontSize:'0.85rem', fontWeight:700, color:'#92400e', marginBottom:10}}>כמה כוסות/כפות/כפיות → גרם</p>
          <div style={{display:'flex', gap:12, alignItems:'center', flexWrap:'wrap'}}>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <input className="input-field" type="number" value={qty} onChange={e=>setQty(e.target.value)} placeholder="כמות" style={{width:90}} min={0} step={0.25} />
              <span style={{fontWeight:600, color:'#374151', whiteSpace:'nowrap'}}>{unitType} {ingredient || '...'}</span>
            </div>
            <span style={{color:'#9ca3af', fontWeight:600}}>=</span>
            <span style={{fontWeight:800, fontSize:'1.2rem', color: result ? '#16a34a' : '#9ca3af'}}>
              {result ? `${result} גרם` : '—'}
            </span>
          </div>
        </div>

        {/* Reverse calc */}
        <div style={{background:'#f0fdf4', borderRadius:14, padding:'16px'}}>
          <p style={{fontSize:'0.85rem', fontWeight:700, color:'#14532d', marginBottom:10}}>כמה גרם → כוסות/כפות/כפיות</p>
          <div style={{display:'flex', gap:12, alignItems:'center', flexWrap:'wrap'}}>
            <div style={{display:'flex', alignItems:'center', gap:8}}>
              <input className="input-field" type="number" value={gramsInput} onChange={e=>setGramsInput(e.target.value)} placeholder="גרמים" style={{width:100}} min={0} />
              <span style={{fontWeight:600, color:'#374151'}}>גרם {ingredient || '...'}</span>
            </div>
            <span style={{color:'#9ca3af', fontWeight:600}}>=</span>
            <span style={{fontWeight:800, fontSize:'1.2rem', color: reverseResult ? '#16a34a' : '#9ca3af'}}>
              {reverseResult ? `${reverseResult} ${unitType}` : '—'}
            </span>
          </div>
        </div>
      </div>

      {/* Conversion table */}
      <div style={{background:'white', borderRadius:18, padding:'24px', boxShadow:'0 2px 12px rgba(0,0,0,0.07)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16, flexWrap:'wrap', gap:10}}>
          <h2 style={{fontWeight:700, fontSize:'1.1rem', color:'#1f2937'}}>טבלת המרות</h2>
          <div style={{display:'flex', gap:8, alignItems:'center', flexWrap:'wrap'}}>
            <div style={{display:'flex', gap:4, background:'#f3f4f6', borderRadius:10, padding:3}}>
              {displayUnits.map(u => (
                <button key={u} onClick={()=>setFilterUnit(u)} style={{padding:'4px 12px', borderRadius:8, border:'none', cursor:'pointer', fontWeight:600, fontSize:'0.82rem', background: filterUnit===u ? 'white' : 'transparent', color: filterUnit===u ? '#f97316' : '#6b7280', boxShadow: filterUnit===u ? '0 1px 4px rgba(0,0,0,0.1)' : 'none'}}>
                  {u}
                </button>
              ))}
            </div>
            <button className="btn-primary" style={{fontSize:'0.85rem', padding:'6px 14px'}} onClick={()=>setShowAddModal(true)}>+ הוסף המרה</button>
          </div>
        </div>

        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:'0.9rem'}}>
            <thead>
              <tr style={{borderBottom:'2px solid #f3f4f6'}}>
                <th style={{textAlign:'right', padding:'8px 10px', color:'#374151', fontWeight:700}}>יחידה</th>
                <th style={{textAlign:'right', padding:'8px 10px', color:'#374151', fontWeight:700}}>מצרך</th>
                <th style={{textAlign:'right', padding:'8px 10px', color:'#374151', fontWeight:700}}>גרם</th>
                <th style={{padding:'8px 10px'}}></th>
              </tr>
            </thead>
            <tbody>
              {tableData.map(row => (
                <tr key={row.id} style={{borderBottom:'1px solid #f9fafb'}} onMouseEnter={e=>e.currentTarget.style.background='#fafafa'} onMouseLeave={e=>e.currentTarget.style.background='white'}>
                  <td style={{padding:'8px 10px'}}>
                    <span style={{background: row.unitType==='כוס'?'#fff7ed':row.unitType==='כף'?'#f0fdf4':'#ede9fe', color: row.unitType==='כוס'?'#c2410c':row.unitType==='כף'?'#15803d':'#7c3aed', borderRadius:8, padding:'2px 8px', fontSize:'0.8rem', fontWeight:700}}>
                      {row.unitType}
                    </span>
                  </td>
                  <td style={{padding:'8px 10px', color:'#374151'}}>{row.ingredient}</td>
                  <td style={{padding:'8px 10px', fontWeight:700, color:'#1f2937'}}>{row.grams}g</td>
                  <td style={{padding:'8px 10px', textAlign:'left'}}>
                    <div style={{display:'flex', gap:6, justifyContent:'flex-end'}}>
                      <button onClick={()=>setEditRow({...row})} style={{background:'#f3f4f6', border:'none', borderRadius:6, padding:'4px 8px', cursor:'pointer', fontSize:'0.78rem'}}>✏️</button>
                      <button onClick={()=>setConfirmDel(row)} style={{background:'#fee2e2', border:'none', borderRadius:6, padding:'4px 8px', cursor:'pointer', fontSize:'0.78rem', color:'#dc2626'}}>✕</button>
                    </div>
                  </td>
                </tr>
              ))}
              {tableData.length === 0 && (
                <tr><td colSpan={4} style={{padding:'24px', textAlign:'center', color:'#9ca3af'}}>אין ערכים בסינון זה</td></tr>
              )}
            </tbody>
          </table>
        </div>
      </div>

      {showAddModal && <ConvModal title="הוספת המרה חדשה" row={{unitType:'כוס',ingredient:'',grams:''}} onClose={()=>setShowAddModal(false)} onSave={row=>{addConv(row);setShowAddModal(false);}} />}
      {editRow && <ConvModal title="עריכת המרה" row={editRow} onClose={()=>setEditRow(null)} onSave={row=>{updateConv(row);setEditRow(null);}} />}
      {confirmDel && (
        <Confirm message={`למחוק את "${confirmDel.unitType} ${confirmDel.ingredient}"?`}
          onConfirm={()=>{deleteConv(confirmDel.id);setConfirmDel(null);}}
          onCancel={()=>setConfirmDel(null)} />
      )}
    </div>
  );
}

function ConvModal({ title, row, onClose, onSave }) {
  const [unitType, setUnitType] = useState(row.unitType);
  const [ingredient, setIngredient] = useState(row.ingredient);
  const [grams, setGrams] = useState(row.grams);
  return (
    <Modal title={title} onClose={onClose}>
      <div style={{display:'flex', flexDirection:'column', gap:14}}>
        <div>
          <label style={{fontSize:'0.85rem', fontWeight:600, color:'#374151', display:'block', marginBottom:5}}>סוג מידה</label>
          <select className="input-field" value={unitType} onChange={e=>setUnitType(e.target.value)}>
            {['כוס','כף','כפית'].map(u=><option key={u} value={u}>{u}</option>)}
          </select>
        </div>
        <div>
          <label style={{fontSize:'0.85rem', fontWeight:600, color:'#374151', display:'block', marginBottom:5}}>מצרך</label>
          <input className="input-field" value={ingredient} onChange={e=>setIngredient(e.target.value)} placeholder="שם המצרך" autoFocus />
        </div>
        <div>
          <label style={{fontSize:'0.85rem', fontWeight:600, color:'#374151', display:'block', marginBottom:5}}>גרם (לכמות אחת)</label>
          <input className="input-field" type="number" value={grams} onChange={e=>setGrams(e.target.value)} placeholder="למשל: 140" />
        </div>
        <div className="flex gap-3 justify-end" style={{marginTop:4}}>
          <button className="btn-secondary" onClick={onClose}>ביטול</button>
          <button className="btn-primary" onClick={()=>{if(ingredient.trim()&&grams) onSave({...row,unitType,ingredient:ingredient.trim(),grams:parseFloat(grams)});}}>שמור</button>
        </div>
      </div>
    </Modal>
  );
}

/* ─── App ────────────────────────────────────────────────── */
function App() {
  const [route, setRoute] = useState({ page: 'home' });
  const [categories, setCategories] = useLS(SK.CATS, DEF_CATS);
  const [recipes, setRecipes] = useLS(SK.RECIPES, []);
  const [conversions, setConversions] = useLS(SK.CONV, DEF_CONV);
  const [ghToken, setGhToken] = useLS(SK.TOKEN, '');
  const [gistId, setGistId] = useLS(SK.GIST_ID, '');
  const [lastSync, setLastSync] = useLS(SK.LAST_SYNC, '');
  const [showSync, setShowSync] = useState(false);

  const navigate = r => { setRoute(r); window.scrollTo(0,0); };

  // קריאה ישירה מ-localStorage כגיבוי למקרה שה-state לא התעדכן בזמן
  function readLS(key) { try { return JSON.parse(localStorage.getItem(key) || 'null'); } catch { return null; } }

  async function syncToCloud() {
    const tok = ghToken || readLS(SK.TOKEN) || '';
    const gid = gistId || readLS(SK.GIST_ID) || '';
    if (!tok) return { ok: false, msg: 'אין Token — הכנס Token ולחץ שמור קודם' };
    try {
      // כתיבה מפורשת ל-localStorage לפני שליחה — מבטיח שמה שנשמר הוא המצב הנוכחי בדיוק
      localStorage.setItem(SK.CATS,    JSON.stringify(categories));
      localStorage.setItem(SK.RECIPES, JSON.stringify(recipes));
      localStorage.setItem(SK.CONV,    JSON.stringify(conversions));
      const content = JSON.stringify({ categories, recipes, conversions, savedAt: new Date().toISOString() }, null, 2);
      const body = { description: 'המתכונים שלי — גיבוי אוטומטי', public: false,
        files: { 'recipes-backup.json': { content } } };
      const url = gid ? `https://api.github.com/gists/${gid}` : 'https://api.github.com/gists';
      const res = await fetch(url, {
        method: gid ? 'PATCH' : 'POST',
        headers: { Authorization: `Bearer ${tok}`, 'Content-Type': 'application/json', Accept: 'application/vnd.github+json' },
        body: JSON.stringify(body)
      });
      if (!res.ok) { const e = await res.json(); return { ok: false, msg: e.message || res.statusText }; }
      const data = await res.json();
      if (!gid) setGistId(data.id);
      setLastSync(new Date().toISOString());
      return { ok: true };
    } catch(e) { return { ok: false, msg: e.message }; }
  }

  async function syncFromCloud() {
    const tok = ghToken || readLS(SK.TOKEN) || '';
    const gid = gistId || readLS(SK.GIST_ID) || '';
    if (!tok) return { ok: false, msg: 'אין Token — הכנס Token ולחץ שמור קודם' };
    try {
      const headers = { Authorization: `Bearer ${tok}`, Accept: 'application/vnd.github+json' };
      let resolvedId = gid;
      if (!resolvedId) {
        const listRes = await fetch('https://api.github.com/gists?per_page=100', { headers });
        if (!listRes.ok) { const e = await listRes.json(); return { ok: false, msg: e.message || listRes.statusText }; }
        const list = await listRes.json();
        const found = list.find(g => g.files && g.files['recipes-backup.json']);
        if (!found) return { ok: false, msg: 'לא נמצא גיבוי ב-GitHub — שמור לענן קודם מהמחשב' };
        resolvedId = found.id;
        setGistId(resolvedId);
      }
      const res = await fetch(`https://api.github.com/gists/${resolvedId}`, { headers });
      if (!res.ok) { const e = await res.json(); return { ok: false, msg: e.message || res.statusText }; }
      const data = await res.json();
      const content = data.files['recipes-backup.json']?.content;
      if (!content) return { ok: false, msg: 'לא נמצא קובץ גיבוי ב-Gist' };
      const parsed = JSON.parse(content);
      // replace מלא ומוחלט — ללא תנאים, ללא merge, בדיוק מה שהיה בענן
      setCategories(Array.isArray(parsed.categories) ? parsed.categories : []);
      setRecipes(Array.isArray(parsed.recipes) ? parsed.recipes : []);
      setConversions(Array.isArray(parsed.conversions) ? parsed.conversions : DEF_CONV);
      // כתיבה מיידית ל-localStorage כדי שגם רענון דף ישמר את המצב הנכון
      localStorage.setItem(SK.CATS,    JSON.stringify(parsed.categories || []));
      localStorage.setItem(SK.RECIPES, JSON.stringify(parsed.recipes || []));
      localStorage.setItem(SK.CONV,    JSON.stringify(parsed.conversions || DEF_CONV));
      setLastSync(new Date().toISOString());
      return { ok: true };
    } catch(e) { return { ok: false, msg: e.message }; }
  }

  function addCategory(cat) { setCategories(p => [...p, cat]); }
  function updateCategory(updated) { setCategories(p => p.map(c => c.id === updated.id ? updated : c)); }
  function deleteCategory(id) {
    setCategories(p => p.filter(c => c.id !== id));
    setRecipes(p => p.filter(r => r.categoryId !== id));
  }

  function addRecipe(categoryId, name, extra = {}) {
    const { ingredients, steps, coverImage } = extra;
    const r = { id: genId(), categoryId, name, coverImage: coverImage || null, socialLink: '', ingredients: ingredients || [], steps: steps || [] };
    setRecipes(p => [...p, r]);
    navigate({ page: 'recipe', recipeId: r.id });
  }

  function updateRecipe(updated) { setRecipes(p => p.map(r => r.id === updated.id ? updated : r)); }
  function deleteRecipe(id) { setRecipes(p => p.filter(r => r.id !== id)); }

  function exportData() {
    const data = { categories, recipes, conversions, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `המתכונים-שלי-${new Date().toLocaleDateString('he-IL').replace(/\//g,'-')}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(data) {
    if (data.categories) setCategories(prev => {
      const existingIds = new Set(prev.map(c => c.id));
      const newOnes = data.categories.filter(c => !existingIds.has(c.id));
      return [...prev, ...newOnes];
    });
    if (data.recipes) setRecipes(prev => {
      const existingIds = new Set(prev.map(r => r.id));
      const newOnes = data.recipes.filter(r => !existingIds.has(r.id));
      return [...prev, ...newOnes];
    });
    if (data.conversions) setConversions(prev => {
      const existingIds = new Set(prev.map(c => c.id));
      const newOnes = data.conversions.filter(c => !existingIds.has(c.id));
      return [...prev, ...newOnes];
    });
  }

  const currentRecipe = route.recipeId ? recipes.find(r => r.id === route.recipeId) : null;
  const currentCategory = route.categoryId
    ? categories.find(c => c.id === route.categoryId)
    : currentRecipe
      ? categories.find(c => c.id === currentRecipe.categoryId)
      : null;

  return (
    <div style={{minHeight:'100vh', background:'#faf9f6'}}>
      <NavBar route={route} navigate={navigate} onSync={() => setShowSync(true)} hasSyncToken={!!ghToken} />
      {showSync && (
        <SyncModal token={ghToken} gistId={gistId} lastSync={lastSync}
          onClose={() => setShowSync(false)}
          onSaveToken={t => setGhToken(t)}
          onSyncTo={syncToCloud}
          onSyncFrom={syncFromCloud} />
      )}
      <main>
        {route.page === 'home' && (
          <HomePage categories={categories} navigate={navigate} onAddCategory={addCategory} onUpdateCategory={updateCategory} onDeleteCategory={deleteCategory} onExport={exportData} onImport={importData} />
        )}
        {route.page === 'category' && currentCategory && (
          <CategoryPage categories={categories} category={currentCategory} recipes={recipes} navigate={navigate}
            onAddRecipe={addRecipe} onDeleteRecipe={deleteRecipe} />
        )}
        {route.page === 'recipe' && currentRecipe && (
          <RecipePage recipe={currentRecipe} category={currentCategory} categories={categories} onUpdate={updateRecipe}
            onDelete={deleteRecipe} navigate={navigate} />
        )}
        {route.page === 'conversion' && (
          <ConversionPage conversions={conversions} setConversions={setConversions} />
        )}
        {/* Fallback */}
        {!['home','category','recipe','conversion'].includes(route.page) && (
          <div style={{textAlign:'center', padding:'80px 20px'}}>
            <p style={{fontSize:'3rem'}}>🤔</p>
            <p style={{color:'#6b7280'}}>עמוד לא נמצא</p>
            <button className="btn-primary" style={{marginTop:16}} onClick={()=>navigate({page:'home'})}>חזרה לראשי</button>
          </div>
        )}
      </main>
      <footer style={{textAlign:'center', padding:'32px 16px', color:'#d1d5db', fontSize:'0.8rem', marginTop:40}}>
        המתכונים שלי 🍽️ • כל הנתונים שמורים במכשיר שלך
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
